<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-line to String List</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; background-color: #f4f4f9; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: monospace; }
        .controls { margin: 1rem 0; display: flex; gap: 10px; align-items: center; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .output-container { background: #fff; padding: 15px; border-radius: 4px; border: 1px solid #ddd; position: relative; }
        pre { white-space: pre-wrap; word-wrap: break-word; margin: 0; color: #333; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>List String Formatter</h2>
    
    <label for="input">Input Text (one item per line):</label>
    <textarea id="input" placeholder="apple&#10;ball&#10;cat"></textarea>

    <div class="controls">
        <button onclick="convertText()">Convert to List</button>
        <button style="background-color: #6c757d;" onclick="copyToClipboard()">Copy Output</button>
    </div>

    <label>Output:</label>
    <div class="output-container">
        <pre id="output">Your formatted list will appear here...</pre>
    </div>

    <script>
        function convertText() {
            const input = document.getElementById('input').value;
            
            // 1. Split by newline
            // 2. Trim whitespace from each line
            // 3. Filter out empty lines
            const lines = input.split(/\r?\n/)
                               .map(line => line.trim())
                               .filter(line => line.length > 0);
            
            // 4. Wrap in quotes and join with commas
            const formatted = lines.map(line => `"${line}"`).join(',');
            
            document.getElementById('output').innerText = formatted;
        }

        function copyToClipboard() {
            const outputText = document.getElementById('output').innerText;
            if (outputText && outputText !== "Your formatted list will appear here...") {
                navigator.clipboard.writeText(outputText);
                alert("Copied to clipboard!");
            }
        }
    </script>
</body>
</html>
